<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>UTH - Quản lý Học Phần</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            padding: 30px;
            background: #e9ecef;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        h2 {
            color: #0056b3;
            margin-top: 0;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 10px;
        }

        input {
            padding: 10px;
            width: 350px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            text-align: left;
        }

        th {
            background: #007bff;
            color: white;
        }

        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: white;
        }

        .btn-info {
            background: #17a2b8;
        }

        .btn-page {
            background: #6c757d;
        }

        .btn-page:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>📚 Hệ thống Quản lý Học phần</h2>
        <div class="toolbar">
            <input type="text" id="txtSearch" placeholder="Tìm theo tên hoặc mã môn..." oninput="loadData(1)">
            <div class="pagination">
                <button class="btn btn-page" id="btnPrev" onclick="movePage(-1)">Trước</button>
                <span id="lblPage" style="margin: 0 15px; font-weight: bold;">Trang 1</span>
                <button class="btn btn-page" id="btnNext" onclick="movePage(1)">Sau</button>
            </div>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Mã HP</th>
                    <th>Tên Học Phần</th>
                    <th>Tín Chỉ</th>
                    <th>Khoa</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody id="dataBody"></tbody>
        </table>
    </div>

    <script>
        let currPage = 1;
        async function loadData(page) {
            currPage = page;
            const search = document.getElementById('txtSearch').value;
            const res = await fetch(`/api/hoc-phan?page=${page}&limit=10&search=${search}`);
            const result = await res.json();

            document.getElementById('dataBody').innerHTML = result.data.map(item => `
                <tr>
                    <td><b>${item.MaHP}</b></td>
                    <td>${item.TenHP}</td>
                    <td>${item.SoTinChi}</td>
                    <td>${item.MaKhoa}</td>
                    <td><button class="btn btn-info" onclick="showDK('${item.MaHP}')">Xem điều kiện</button></td>
                </tr>
            `).join('');

            document.getElementById('lblPage').innerText = `Trang ${result.pagination.page} / ${result.pagination.totalPages}`;
            document.getElementById('btnPrev').disabled = (page <= 1);
            document.getElementById('btnNext').disabled = (page >= result.pagination.totalPages);
        }

        async function showDK(id) {
            const res = await fetch(`/api/hoc-phan/${id}/dieu-kien`);
            const data = await res.json();
            if (data.length === 0) alert("Môn này không có môn tiên quyết.");
            else alert("Các môn tiên quyết:\n" + data.map(d => "- " + d.TenHP).join("\n"));
        }

        function movePage(step) { loadData(currPage + step); }
        loadData(1);
    </script>
</body>

</html>
